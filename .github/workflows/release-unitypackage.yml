name: Release Unitypackage

on:
  push:
    tags:
      - '*-v*'
  workflow_dispatch:
    inputs:
      package_path:
        description: Unity project directory to export from
        required: true
        default: Packages/VLiveKit_LiveToon
        type: string
      export_path:
        description: Asset path inside the selected Unity project
        required: true
        default: Assets/toshi.VLiveKit/livetoon
        type: string
      version:
        description: Release version. Uses package.json when empty.
        required: false
        type: string
      release_tag:
        description: Release tag. Uses package-name-vversion when empty.
        required: false
        type: string
      draft:
        description: Create the GitHub release as a draft
        required: true
        default: true
        type: boolean
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: false
        type: boolean
      include_dependencies:
        description: Include referenced dependencies in the unitypackage
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Export and publish unitypackage
    runs-on: [self-hosted, Windows]

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve release inputs
        id: release
        run: |
          $projectPath = "${{ inputs.package_path }}"
          $exportPath = "${{ inputs.export_path }}"
          $version = "${{ inputs.version }}"
          $tag = "${{ inputs.release_tag }}"
          $draft = "${{ inputs.draft }}"
          $prerelease = "${{ inputs.prerelease }}"
          $includeDependencies = "${{ inputs.include_dependencies }}"

          function Get-RelativePath {
            param(
              [Parameter(Mandatory = $true)][string]$From,
              [Parameter(Mandatory = $true)][string]$To
            )

            $fromFullPath = [System.IO.Path]::GetFullPath($From).TrimEnd('\', '/') + [System.IO.Path]::DirectorySeparatorChar
            $toFullPath = [System.IO.Path]::GetFullPath($To)
            $fromUri = [System.Uri]::new($fromFullPath)
            $toUri = [System.Uri]::new($toFullPath)
            return [System.Uri]::UnescapeDataString($fromUri.MakeRelativeUri($toUri).ToString()).Replace('/', [System.IO.Path]::DirectorySeparatorChar)
          }

          if ($env:GITHUB_EVENT_NAME -eq "push") {
            $tag = $env:GITHUB_REF_NAME
            $draft = "false"
            $prerelease = "false"
            $includeDependencies = "false"

            if ($tag -notmatch '^(?<packageName>.+)-v(?<version>.+)$') {
              throw "Tag must look like <package-name>-v<version>. Example: com.toshi.vlivekit.livetoon-v0.0.5"
            }

            $tagPackageName = $Matches.packageName
            $version = $Matches.version
            $packageJsonCandidates = Get-ChildItem "Packages" -Recurse -Filter package.json |
              Where-Object {
                $_.FullName -notmatch '\\Library\\' -and $_.FullName -notmatch '\\PackageCache\\'
              }

            $matchedPackageJson = $null
            foreach ($candidate in $packageJsonCandidates) {
              try {
                $candidateJson = Get-Content $candidate.FullName -Raw | ConvertFrom-Json
              } catch {
                continue
              }

              if ($candidateJson.name -eq $tagPackageName) {
                $matchedPackageJson = $candidate
                break
              }
            }

            if (-not $matchedPackageJson) {
              throw "Could not find package.json with name '$tagPackageName' under Packages."
            }

            $packageJsonFullPath = $matchedPackageJson.FullName
            $assetsMarker = [System.IO.Path]::DirectorySeparatorChar + "Assets" + [System.IO.Path]::DirectorySeparatorChar
            $assetsIndex = $packageJsonFullPath.IndexOf($assetsMarker, [System.StringComparison]::OrdinalIgnoreCase)
            if ($assetsIndex -lt 0) {
              throw "Matched package.json must be inside a Unity project's Assets folder: $packageJsonFullPath"
            }

            $projectFullPath = $packageJsonFullPath.Substring(0, $assetsIndex)
            $exportFullPath = Split-Path $packageJsonFullPath -Parent
            $projectPath = Get-RelativePath -From $env:GITHUB_WORKSPACE -To $projectFullPath
            $exportPath = (Get-RelativePath -From $projectFullPath -To $exportFullPath).Replace('\', '/')

            if ($version -match '-') {
              $prerelease = "true"
            }
          } elseif (-not $version -and $tag -match '-v(.+)$') {
              $version = $Matches[1]
          }

          $projectPath = $projectPath.TrimEnd('/','\')
          $exportPath = $exportPath.Replace('\', '/').TrimEnd('/')
          $packageJsonPath = Join-Path $projectPath (Join-Path $exportPath "package.json")

          $packageName = Split-Path $projectPath -Leaf
          $displayName = $packageName

          if (Test-Path $packageJsonPath) {
            $packageJson = Get-Content $packageJsonPath -Raw | ConvertFrom-Json
            if ($packageJson.name) { $packageName = $packageJson.name }
            if ($packageJson.displayName) { $displayName = $packageJson.displayName }
            if (-not $version -and $packageJson.version) { $version = $packageJson.version }
          }

          if (-not $version) {
            throw "Version was not provided and package.json was not found at $packageJsonPath"
          }

          if (-not $tag) {
            $tag = "$packageName-v$version"
          }

          $safeName = $packageName -replace '[^A-Za-z0-9._-]', '-'
          $distPath = Join-Path $env:GITHUB_WORKSPACE "dist"
          $unityPackagePath = Join-Path $distPath "$safeName-$version.unitypackage"
          $sha256Path = "$unityPackagePath.sha256"

          New-Item -ItemType Directory -Force -Path $distPath | Out-Null

          "project_path=$projectPath" >> $env:GITHUB_OUTPUT
          "export_path=$exportPath" >> $env:GITHUB_OUTPUT
          "package_name=$packageName" >> $env:GITHUB_OUTPUT
          "display_name=$displayName" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "draft=$draft" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          "include_dependencies=$includeDependencies" >> $env:GITHUB_OUTPUT
          "unitypackage_path=$unityPackagePath" >> $env:GITHUB_OUTPUT
          "sha256_path=$sha256Path" >> $env:GITHUB_OUTPUT

      - name: Install release exporter
        run: |
          $editorPath = Join-Path "${{ steps.release.outputs.project_path }}" "Assets/Editor"
          New-Item -ItemType Directory -Force -Path $editorPath | Out-Null
          Copy-Item ".github/unity/VLiveKitUnityPackageExporter.cs" (Join-Path $editorPath "VLiveKitUnityPackageExporter.cs") -Force

      - name: Resolve Unity editor
        id: unity
        run: |
          if ($env:UNITY_EDITOR_PATH) {
            $unityPath = $env:UNITY_EDITOR_PATH
          } else {
            $projectVersionPath = Join-Path "${{ steps.release.outputs.project_path }}" "ProjectSettings/ProjectVersion.txt"
            $projectVersion = (Get-Content $projectVersionPath | Select-String "m_EditorVersion:").ToString().Split(":")[1].Trim()
            $unityPath = "C:\Program Files\Unity\Hub\Editor\$projectVersion\Editor\Unity.exe"
          }

          if (-not (Test-Path $unityPath)) {
            throw "Unity editor was not found. Set UNITY_EDITOR_PATH or install the project Unity version. Tried: $unityPath"
          }

          "unity_path=$unityPath" >> $env:GITHUB_OUTPUT

      - name: Export unitypackage
        run: |
          $arguments = @(
            "-batchmode",
            "-quit",
            "-nographics",
            "-projectPath",
            "${{ steps.release.outputs.project_path }}",
            "-executeMethod",
            "VLiveKit.Release.UnityPackageExporter.Export",
            "-exportPackageSourcePath",
            "${{ steps.release.outputs.export_path }}",
            "-exportPackageOutputPath",
            "${{ steps.release.outputs.unitypackage_path }}",
            "-exportPackageIncludeDependencies",
            "${{ steps.release.outputs.include_dependencies }}"
          )

          $process = Start-Process -FilePath "${{ steps.unity.outputs.unity_path }}" -ArgumentList $arguments -Wait -PassThru -WindowStyle Hidden
          if ($process.ExitCode -ne 0) {
            throw "Unity export failed with exit code $($process.ExitCode)"
          }

      - name: Create checksum
        run: |
          $hash = Get-FileHash "${{ steps.release.outputs.unitypackage_path }}" -Algorithm SHA256
          "$($hash.Hash.ToLowerInvariant())  $(Split-Path "${{ steps.release.outputs.unitypackage_path }}" -Leaf)" | Set-Content "${{ steps.release.outputs.sha256_path }}" -NoNewline

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.display_name }} ${{ steps.release.outputs.version }}
          draft: ${{ steps.release.outputs.draft }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          generate_release_notes: true
          files: |
            ${{ steps.release.outputs.unitypackage_path }}
            ${{ steps.release.outputs.sha256_path }}
